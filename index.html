<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pietra & Co. | Luxury Decor</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">PIETRA & CO.</div>
        <div class="nav-right">
            <a href="#nosotros" class="nav-link">Nosotros</a>
            <div class="cart-icon" onclick="toggleCart()">
                <span>🛒</span>
                <span id="cart-count">0</span>
            </div>
        </div>
    </nav>

    <header class="hero">
        <h1>prueba</h1>
        <p>Artesanía peruana en piedra para hogares exclusivos.</p>
    </header>

    <main class="container">
        <div id="product-list" class="product-grid">
            </div>
    </main>

    <div id="cart-drawer" class="cart-drawer">
        <div class="cart-header">
            <h3>Tu Selección</h3>
            <button class="close-btn" onclick="toggleCart()">✕</button>
        </div>
        <div id="cart-items" class="cart-body">
            </div>
        <div class="cart-footer">
            <div class="row"><span>Subtotal:</span><span>S/ <span id="subtotal">0.00</span></span></div>
            <div class="row"><span>Envío Lima:</span><span>S/ 12.00</span></div>
            <div class="row total"><span>Total:</span><span>S/ <span id="total-final">0.00</span></span></div>
            <button class="btn-whatsapp" onclick="enviarWhatsApp()">PEDIR POR WHATSAPP</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
