<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pietra & Co. | Inventario Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-text">
            <h1>PIETRA & CO.</h1>
            <span>MINIMALISMO ARTESANAL</span>
        </div>
    </header>

    <nav>
        <div class="filters">
            <a onclick="renderizarGaleria('todos')">Colección</a>
            <a onclick="renderizarGaleria('joyeros')">Joyeros</a>
            <a onclick="renderizarGaleria('portavelas')">Velas</a>
        </div>
        <a onclick="toggleCart(true)" class="cart-btn">Mi Selección (<span id="cart-count">0</span>)</a>
    </nav>

    <div class="container">
        <div class="grid" id="product-list">
            </div>
    </div>

    <div id="cart-drawer">
        <h2 style="font-family:'Cormorant Garamond'; margin-bottom:2rem;">Selección Boutique</h2>
        <div id="cart-items"></div>
        <div class="cart-footer" style="margin-top:2rem; border-top:1px solid #eee; padding-top:1.5rem;">
            <p style="display:flex; justify-content:space-between; font-weight:bold;">TOTAL <span>S/ <span id="cart-total">0.00</span></span></p>
            <button class="btn-order" style="background:#25D366;" onclick="enviarAWhatsApp()">PEDIR POR WHATSAPP</button>
            <button onclick="toggleCart(false)" style="display:block; width:100%; margin-top:1.5rem; background:none; border:none; cursor:pointer; color:#999; font-size:0.7rem; letter-spacing:2px;">CERRAR</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
