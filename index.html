<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIETRA | mmMinimalismo Artesanal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;500&family=Playfair+Display:ital,wght@0,400;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar-luxury">
        <div class="nav-left">
            <div class="menu-trigger" onclick="toggleMenu()">
                <span class="hamburger">☰</span>
                <span class="menu-label">Menú</span>
            </div>
        </div>

        <div class="nav-center">
            <span class="logo-brand">PIETRA & CO.</span>
        </div>

        <div class="nav-right">
            <div class="action-bar">
                <div class="search-wrapper">
                    <input type="text" id="search-input" placeholder="Buscar..." onkeyup="ejecutarBusqueda()">
                    <span class="action-icon">🔍</span>
                </div>
                <div class="favorite-wrapper">
                    <span class="action-icon">♡</span>
                    <span id="fav-count" class="notif-badge">0</span>
                </div>
                <div class="cart-wrapper" onclick="toggleCart()">
                    <span class="action-icon">🛒</span>
                    <span id="cart-count" class="notif-badge">0</span>
                </div>
            </div>
        </div>
    </nav>

    <div id="side-menu" class="side-drawer">
        <div class="drawer-header">
            <button class="close-drawer" onclick="toggleMenu()">✕</button>
        </div>
        <div class="drawer-content">
            <a href="index.html" onclick="toggleMenu()">Colección</a>
            <a href="nosotros.html">Nosotros</a>
            <a href="#contacto" onclick="toggleMenu()">Contacto</a>
        </div>
    </div>

    <header class="hero">
        <h1>Minimalismo Artesanal</h1>
        <p>Ecoresina y Diseño Sostenible</p>
    </header>

    <section class="banner-carousel">
        <div class="carousel-track" id="banner-track"></div>
    </section>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="filtrar('todos')">Todos</button>
        <button class="filter-btn" onclick="filtrar('jarrones')">Jarrones</button>
        <button class="filter-btn" onclick="filtrar('portavelas')">Portavelas</button>
        <button class="filter-btn" onclick="filtrar('bandejas')">Bandejas</button>
    </div>

    <main class="container">
        <div id="product-list" class="product-grid"></div>
    </main>

    <div id="cart-drawer" class="cart-drawer">
        <div class="cart-header">
            <h3>Tu Selección</h3>
            <button onclick="toggleCart()">✕</button>
        </div>
        <div id="cart-items" class="cart-body"></div>
        <div class="cart-footer">
            <div class="row"><span>Subtotal:</span><span>S/ <span id="subtotal">0.00</span></span></div>
            <div class="row"><span>Envío Lima:</span><span>S/ 12.00</span></div>
            <div class="row total"><span>Total:</span><span>S/ <span id="total-final">0.00</span></span></div>
            <button class="btn-whatsapp" onclick="enviarWhatsApp()">PEDIR POR WHATSAPP</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
